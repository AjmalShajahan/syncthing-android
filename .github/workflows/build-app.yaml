name: Build App

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - release
      - dev

env:
  # Our build metadata
  BUILD_USER: android-builder
  BUILD_HOST: github.ajmalshajahan.me

jobs:
  build:
    name: Debug Build
    runs-on: ubuntu-latest
    container: ghcr.io/ajmalshajahan/syncthing-android-builder@sha256:360c97a9037367912b1ab27d633c5bd01c0aba68bea668705a53cfb261bd8fcb
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: true
          fetch-depth: 0

      - name: build
        run: |
          git config --system --add safe.directory '*'
          java -version
          ./gradlew --no-daemon buildNative lint assembleDebug

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: syncthing-android-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reports-and-libs
          path: |
            app/build/reports/**
            app/src/main/jniLibs/**
