name: Image Builder Template

on:
  workflow_call:
    inputs:
      push:
        required: true
        type: boolean

env:
  # Our build metadata
  BUILD_USER: android-builder
  BUILD_HOST: github.ajmalshajahan.me
  # template var
  image: ghcr.io/ajmalshajahan/syncthing-android-builder

jobs:
  build-image:
    name: Build Builder Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          submodules: true
          fetch-depth: 0

      - uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2

      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3
        if: ${{ inputs.push }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@0a97817b6ade9f46837855d676c4cca3a2471fc9 # v4
        with:
          context: .
          file: ./docker/Dockerfile
          tags: '${{ env.image }}:latest,${{ env.image }}:${{ github.sha }}'
          push: ${{ inputs.push }}
