name: Image Builder Template

on:
  workflow_call:
    inputs:
      push:
        required: true
        type: boolean

env:
  # Our build metadata
  BUILD_USER: android-builder
  BUILD_HOST: github.ajmalshajahan.me
  # template var
  image: ghcr.io/ajmalshajahan/syncthing-android-builder

jobs:
  build-image:
    name: Build Builder Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          submodules: true
          fetch-depth: 0

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3
        if: ${{ inputs.push }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./docker/Dockerfile
          tags: '${{ env.image }}:latest,${{ env.image }}:${{ github.sha }}'
          push: ${{ inputs.push }}
